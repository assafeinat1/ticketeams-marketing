name: Manychat Label → Monday Sync

on:
  schedule:
    # Every 5 minutes (GitHub's minimum cron interval)
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write # needed to commit updated state file back to the repo

concurrency:
  group: manychat-label-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Poll Manychat labels and fire tags
        env:
          MANYCHAT_COOKIES: ${{ secrets.MANYCHAT_COOKIES }}
          MANYCHAT_CSRF: ${{ secrets.MANYCHAT_CSRF }}
          MANYCHAT_PAGE_ID: ${{ secrets.MANYCHAT_PAGE_ID }}
          MANYCHAT_PUBLIC_API_TOKEN: ${{ secrets.MANYCHAT_PUBLIC_API_TOKEN }}
        run: node ticketeams-ai-engine/scripts/manychat-label-poll.mjs

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ticketeams-ai-engine/state/manychat-label-sync-state.json
          if git diff --cached --quiet; then
            echo "No state change."
          else
            git commit -m "chore(manychat-sync): update state [skip ci]"
            git push
          fi
